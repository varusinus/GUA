name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate a CI signing key and sign the ruleset
        # Each CI run uses a throwaway key; the committed ruleset is re-signed so
        # the governance verification (and the tests that depend on it) pass.
        run: python governance/sign_ruleset.py --generate-key

      - name: Verify the ruleset signature
        run: python governance/verify_ruleset.py

      - name: Run the test suite
        run: python -m pytest -q
